<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="mapTitle">
  <title id="mapTitle">خريطة كوردستان</title>
  <defs>
    <linearGradient id="mapGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b3f21" />
      <stop offset="100%" stop-color="#3b7a3e" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" rx="30" fill="#081009" />
  <path d="M150 180 L230 110 L320 120 L410 80 L500 100 L580 160 L600 240 L580 320 L520 360 L440 340 L380 380 L320 360 L250 410 L180 380 Z" fill="url(#mapGrad)" filter="url(#glow)" />
  <circle cx="330" cy="170" r="10" fill="#f5c842" />
  <circle cx="190" cy="230" r="10" fill="#f5c842" />
  <circle cx="530" cy="190" r="10" fill="#f5c842" />
  <circle cx="470" cy="305" r="10" fill="#f5c842" />
  <text x="330" y="160" fill="#fff" font-family="Cairo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">هولير / أربيل</text>
  <text x="190" y="250" fill="#fff" font-family="Cairo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">دهوك</text>
  <text x="520" y="180" fill="#fff" font-family="Cairo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">السليمانية</text>
  <text x="470" y="325" fill="#fff" font-family="Cairo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">كركوك</text>
  <text x="185" y="380" fill="#dcd2a5" font-family="Tajawal, sans-serif" font-size="20" text-anchor="middle">كوردستان</text>
</svg>